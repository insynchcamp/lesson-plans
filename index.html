<style>

.fbcard img{max-width:140px;border-radius:8px;margin-top:6px;border:1px solid var(--border)}
.athchips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}

.addrow{display:flex;gap:6px;margin-top:8px}

.grouplink{color:var(--purple-mid);cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.roster{font-size:.82rem;background:var(--purple-light);border-radius:6px;padding:6px 8px;margin:4px 0;color:var(--purple-dark)}
.medialist{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

.medialist .thumb{position:relative}
.medialist .thumb button{position:absolute;top:-6px;right:-6px;background:#DC2626;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.65rem;line-height:1;cursor:pointer}
.medialist .linkchip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--purple-mid);color:var(--purple-mid);border-radius:999px;padding:4px 10px;font-size:.78rem;text-decoration:none}
.medialist .linkchip button{border:none;background:none;color:#DC2626;cursor:pointer;font-size:.7rem;margin-left:2px}
.mediaadd{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}
.mediaadd input[type=text]{flex:1;min-width:100px}

.attbtns button{border:1px solid var(--border);background:#fff;border-radius:999px;padding:3px 10px;font-size:.75rem;cursor:pointer;font-weight:600}

<div class="hdr">
  <h1>In <span class="syn">Synch</span> Summer Camp 2026</h1>
  <div class="tag">One Team. One Dream. In Synch. &middot; Winchester</div>
</div>
<div class="mebar">
  <label for="meSel">I am:</label>
  <select id="meSel" onchange="setMe(this.value)"></select>
  <button id="onlyMeBtn" class="pill-toggle" onclick="toggleOnlyMe()">Just my sessions</button>
  <span id="syncDot" style="font-size:.72rem;color:var(--muted);margin-left:auto"></span>
  <button id="adminBtn" class="pill-toggle" style="border-color:var(--silver);color:var(--muted)" onclick="adminToggle()">🔒</button>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="app"></div>

<script>
/* ============ FIREBASE CONFIG ============
   Paste your Firebase web-app config between the braces below.
   Leave empty {} to run in local-only mode (export/import files). */
const FIREBASE_CONFIG={
  apiKey: "AIzaSyBfJWuylMVTxHyLwNFq0x668aSzalWlCRo",
  authDomain: "in-synch-lesson-plan.firebaseapp.com",
  projectId: "in-synch-lesson-plan",
  storageBucket: "in-synch-lesson-plan.firebasestorage.app",
  messagingSenderId: "385965935257",
  appId: "1:385965935257:web:0fdae706114c2890928608"
};

/* ================= DATA ================= */
const LS='insynch2026_v1';
const ACTS={'Warm up':'var(--warmup)','Routine':'var(--routine)','Skill':'var(--skill)','Figure':'var(--figure)','Acro':'var(--acro)'};
const DAYS=[
 {k:'sun',n:'Sunday',dd:'26 July'},
 {k:'mon',n:'Monday',dd:'27 July'},
 {k:'tue',n:'Tuesday',dd:'28 July'},
 {k:'wed',n:'Wednesday',dd:'29 July'},
 {k:'thu',n:'Thursday',dd:'30 July'},
 {k:'fri',n:'Friday',dd:'31 July'},
 {k:'sat',n:'Saturday',dd:'1 August'}
];
const DAYDATES={sun:'2026-07-26',mon:'2026-07-27',tue:'2026-07-28',wed:'2026-07-29',thu:'2026-07-30',fri:'2026-07-31',sat:'2026-08-01'};
function dayLabel(k){const d=DAYS.find(x=>x.k===k);return d?d.n+' '+d.dd:k;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

function swimBlocks(landWarm,poolWarm,times,extra){
  const b=[
    {t:landWarm,label:'Land warm-up',land:true,asg:[]},
    {t:poolWarm,label:'Pool warm-up',warmup:true,sharedPlan:'',asg:[]}
  ];
  times.forEach(t=>b.push({t:t,asg:[]}));
  if(extra)b.push(extra);
  return b;
}
const SWIM_SESSION_ORDER=['mon-swim-am','mon-swim-pm','tue-swim-am','tue-swim-pm','wed-swim-am','wed-swim-pm','thu-swim-am','thu-swim-pm','fri-swim-am','fri-swim-pm'];
/* Land warm-up (15 min): only 4 coaches involved (Maisie sits this one out), so with 5 groups
   one coach always doubles up. Which coach doubles rotates session to session for fairness.
   Pool warm-up (30 min): unchanged — all 5 Routine coaches, one group each, rotating so every
   coach leads every group exactly twice across the 10 sessions. */
function buildPoolWarmupAsg(coaches,groups,s){
  const asg=[];
  coaches.forEach((c,ci)=>{
    const g=groups[(s+ci)%groups.length];
    asg.push({id:uid(),coach:c,activity:'Warm up',skills:'',group:g,notes:''});
  });
  return asg;
}
function buildLandWarmupAsg(coaches,groups,s){
  if(!coaches.length)return[];
  const n=coaches.length;
  const doubleIdx=s%n; // which coach picks up the 5th (extra) group this session
  const slots=coaches.concat([coaches[doubleIdx]]); // n+1 slots, one coach repeated
  const asg=[];
  slots.forEach((c,ci)=>{
    const g=groups[(s+ci)%groups.length];
    asg.push({id:uid(),coach:c,activity:'Warm up',skills:'',group:g,notes:''});
  });
  return asg;
}
function generateWarmupRotation(sessions,landCoaches,poolCoaches,groups){
  if(!groups.length||!poolCoaches.length)return;
  SWIM_SESSION_ORDER.forEach((sid,s)=>{
    const sess=sessions[sid];
    if(!sess)return;
    const landBlock=sess.blocks.find(b=>b.land);
    const poolBlock=sess.blocks.find(b=>b.warmup);
    if(!landBlock||!poolBlock)return;
    landBlock.asg=buildLandWarmupAsg(landCoaches,groups,s);
    poolBlock.asg=buildPoolWarmupAsg(poolCoaches,groups,s);
  });
}
const AM_TIMES=['8:45–9:00am','9:00–9:15am','9:15–9:30am','9:30–9:45am','9:45–10:00am','10:00–10:15am'];
const PM_TIMES=['5:00–5:15pm','5:15–5:30pm','5:30–5:45pm','5:45–6:00pm','6:00–6:15pm','6:15–6:30pm'];
/* Friday PM has its own fixed structure (not the rotating multi-coach system): land + pool
   warm-up as usual, then each of the 5 Routine coaches gets 30 min alone with their own home
   group to finish preparing (no staggering/rotating needed since it's just the 5 fixed pairs),
   then performances, then free time for photos. */
function friSwimPmRoutineAsg(){
  return ROUTINE_ASSIGN.map(ra=>({id:uid(),coach:ra.coach,activity:'Routine',skills:'',group:ra.group,notes:''}));
}

/* ---- Routine rotation: 5 named coaches, fixed home group, 30-min Routine block each,
   staggered so they're not all running music at once, plus a rotation through the other
   4 coaches for the remaining time.

   Session shape: 15-min land warm-up, 30-min pool warm-up, then SIX 15-min blocks
   (8:45–10:15am / 5:00–6:30pm). A 2-block (30-min) Routine window has exactly 5 valid
   starting positions in a 6-block timeline (0,1,2,3,4) — an exact match for 5 coaches, so
   every coach gets precisely 2 blocks of Routine, no bonus block, no forced sharing. At most
   2 coaches are ever on Routine at the same block (down from a full 5-way overlap in the old
   45-min design), so the "not everyone on the speaker at once" goal is much better met too.
   Because each coach now has 4 non-Routine blocks (up from 3), and there are exactly 4 other
   groups to rotate through, every group meets every one of the other 4 coaches within a
   single swim session — full "all 5 coaches per session" coverage natively, every day. ---- */
const ROUTINE_ASSIGN=[
  {coach:'Maisie',group:'Team Lavender'},
  {coach:'Bianca',group:'Team Iris'},
  {coach:'Daisy',group:'Team Violet'},
  {coach:'Gemma',group:'Team Amethyst'},
  {coach:'Romane',group:'Team Lilac'}
];
/* Land warm-up (8:00–8:15am / 4:15–4:30pm) drops Maisie — only these 4 coaches run it, so one
   of them always has 2 groups. Pool warm-up keeps all 5 Routine coaches (see ROUTINE_ASSIGN). */
const LAND_WARMUP_COACHES=ROUTINE_ASSIGN.map(ra=>ra.coach).filter(c=>c!=='Maisie');
/* Fixed pool lanes, same every day, independent of which coach is supervising: */
const LANE_NUMBER={'Team Amethyst':5,'Team Violet':4,'Team Lavender':3,'Team Iris':2,'Team Lilac':1};
const LANE_ORDER=['Team Amethyst','Team Violet','Team Lavender','Team Iris','Team Lilac'];
function sortByLane(list){ return [...list].sort((a,b)=>(LANE_NUMBER[b.group]||0)-(LANE_NUMBER[a.group]||0)); }
/* Both patterns verified by exhaustive search: every coach visits every one of the other 4
   groups exactly once, every group is visited by every one of the other 4 coaches exactly
   once, within the single 6-block session — no gaps, no repeats. AM and PM use different
   (but equally valid) pairings so the week doesn't feel identical morning and afternoon. */
const ROUTINE_PATTERN_AM=[
  {routine:[0],rot:[[1,3],[2,4],[3,2],[4,1]]},
  {routine:[0,1],rot:[[2,3],[3,4],[4,2]]},
  {routine:[1,2],rot:[[0,4],[3,0],[4,3]]},
  {routine:[2,3],rot:[[0,1],[1,4],[4,0]]},
  {routine:[3,4],rot:[[0,2],[1,0],[2,1]]},
  {routine:[4],rot:[[0,3],[1,2],[2,0],[3,1]]}
];
const ROUTINE_PATTERN_PM=[
  {routine:[0],rot:[[1,4],[2,3],[3,1],[4,2]]},
  {routine:[0,1],rot:[[2,4],[3,2],[4,3]]},
  {routine:[1,2],rot:[[0,3],[3,4],[4,0]]},
  {routine:[2,3],rot:[[0,4],[1,0],[4,1]]},
  {routine:[3,4],rot:[[0,1],[1,2],[2,0]]},
  {routine:[4],rot:[[0,2],[1,3],[2,1],[3,0]]}
];
const ROUTINE_SESSIONS=[
  {sid:'mon-swim-am',pattern:ROUTINE_PATTERN_AM,shift:0},{sid:'mon-swim-pm',pattern:ROUTINE_PATTERN_PM,shift:0},
  {sid:'tue-swim-am',pattern:ROUTINE_PATTERN_AM,shift:1},{sid:'tue-swim-pm',pattern:ROUTINE_PATTERN_PM,shift:1},
  {sid:'wed-swim-am',pattern:ROUTINE_PATTERN_AM,shift:2},{sid:'wed-swim-pm',pattern:ROUTINE_PATTERN_PM,shift:2},
  {sid:'thu-swim-am',pattern:ROUTINE_PATTERN_AM,shift:3},{sid:'thu-swim-pm',pattern:ROUTINE_PATTERN_PM,shift:3},
  {sid:'fri-swim-am',pattern:ROUTINE_PATTERN_AM,shift:4}
  /* fri-swim-pm intentionally excluded — different structure, left for later */
];
/* Per-session content for the rotation blocks (the time not spent on each coach's own
   Routine). Two ways to target it, filled in day by day as breakdowns are provided:
   - byCoach: content follows the COACH (e.g. Monday AM — each coach runs the same station
     topic no matter which group visits them).
   - byGroup: content follows the GROUP (e.g. Monday PM figures — each group works the same
     figure list no matter which coach they're rotated to).
   - acro: flags specific (block index, coach) pairs as a 15-min Acro session instead of Figure/Skill
     content, so each coach gets exactly one Acro slot with a non-home group that session.
   Sessions/slots not listed here just stay blank until filled in. */
const ROTATION_CONTENT={
  'mon-swim-am':{
    // Every Monday AM rotation slot is labelled Skill (not Figure), per Maisie's instruction —
    // these are conditioning/drill themes, not named competition figures.
    byCoach:{
      'Bianca':{activity:'Skill',topic:'Airborne weight',bullets:[

const SKILL_ROUNDS=['mon-swim-am','tue-swim-am','wed-swim-am','thu-swim-am'];

/* --- Figures & Skills library: descriptions/images/links attached to the figure/skill itself
   (not to a specific assignment instance), so they show automatically wherever that figure or
   skill is scheduled all week, and survive "Regenerate Routine schedule" / "Regenerate rotation"
   (which otherwise wipe anything typed into individual session blocks). Skills are keyed by
   "round session id|coach" since the same topic name can legitimately repeat with different
   content across rounds/coaches (e.g. Gemma teaches two different things both called
   "Rotations"). Figures are a small fixed catalog of 8 names, so the name itself is the key. */
function skillKey(sid,coach){ return sid+'|'+coach; }
function resolveSkillKey(sid,a){
  if(!a||a.activity!=='Skill')return null;
  if(SKILL_ROUNDS.includes(sid))return skillKey(sid,a.coach);
  if(sid==='fri-swim-am'){
    // Friday is a catch-up: the content actually belongs to the group's own home coach,
    // from whichever of the 4 rounds it was originally drawn from — find it by matching topic.
    const home=ROUTINE_ASSIGN.find(ra=>ra.group===a.group);
    if(!home)return null;
    for(const rsid of SKILL_ROUNDS){
      const src=ROTATION_CONTENT[rsid]&&ROTATION_CONTENT[rsid].byCoach&&ROTATION_CONTENT[rsid].byCoach[home.coach];
      if(src&&a.skills&&a.skills.startsWith(src.topic))return skillKey(rsid,home.coach);
    }
  }
  return null;
}
function resolveFigureKey(a){
  if(!a||a.activity!=='Figure'||!a.skills)return null;
  const base=a.skills.split(' — catch-up')[0];
  return ALL_FIGURES.includes(base)?base:null;
}
function skillFigureMediaHtml(sid,a){
  let media=null;
  if(a.activity==='Skill'){ const k=resolveSkillKey(sid,a); if(k)media=S.skillMedia[k]; }
  else if(a.activity==='Figure'){ const k=resolveFigureKey(a); if(k)media=S.figureMedia[k]; }
  if(!media)return '';
  const hasDesc=media.description, hasMedia=(media.images&&media.images.length)||(media.links&&media.links.length);
  if(!hasDesc&&!hasMedia)return '';
  return (hasDesc?`<div class="nt" style="font-style:italic">${esc(media.description)}</div>`:'')+mediaDisplayHtml(media);
}

/* --- "Own Routine coach's skill" catch-up on Friday AM ---
   Monday–Thursday AM run 4 rounds of skill content (5 topics per round, one per coach). Since
   a coach's 4 "other" groups are fixed all week and each round is a different day, by
   Thursday every group has received ALL 4 topics from EACH of their 4 non-home coaches —
   16 of the 20 skills, entirely naturally, zero catch-up needed for those.
   The remaining 4 — their own Routine coach's 4 topics — can structurally never reach them
   directly (that coach is always on Routine with them, never Skill), on ANY day of the week.
   Friday AM's 4 rotation blocks are reserved for exactly this: each group gets all 4 of their
   own coach's topics, delivered by whichever coach is already rotating through them that day
   (the skill belongs to the group, not to a specific deliverer — same idea as the Monday PM
   figure catch-up). 5 groups × 4 topics = 20 items into 5 groups × 4 Friday slots = 20 slots:
   an exact fit, verified by test. */
function findMissingHomeSkills(){
  const rounds=['mon-swim-am','tue-swim-am','wed-swim-am','thu-swim-am'];
  const out=[];
  ROUTINE_ASSIGN.forEach(ra=>{
    rounds.forEach(sid=>{
      const rc=ROTATION_CONTENT[sid];
      const src=rc&&rc.byCoach&&rc.byCoach[ra.coach];
      if(src) out.push({group:ra.group,homeCoach:ra.coach,activity:src.activity,topic:src.topic,bullets:src.bullets});
    });
  });
  return out;
}
function findHomeSkillCatchupSlots(missingSkills,targetSid){
  const sess=S_REF.sessions[targetSid];
  const qb=sess.blocks.filter(b=>!b.land&&!b.warmup);
  const usedBlocksForGroup={};
  const placements=[],unplaced=[];
  missingSkills.forEach(ms=>{
    let placed=false;
    qb.forEach((b,bi)=>{
      if(placed)return;
      if(usedBlocksForGroup[ms.group]&&usedBlocksForGroup[ms.group].has(bi))return;
      const e=b.asg.find(a=>a.group===ms.group&&a.activity!=='Routine');
      if(!e||(e.skills&&e.skills.indexOf('catch-up')!==-1))return; // no slot, or already used for another catch-up this run
      placements.push({blockIdx:bi,group:ms.group,homeCoach:ms.homeCoach,activity:ms.activity,topic:ms.topic,bullets:ms.bullets});
      usedBlocksForGroup[ms.group]=usedBlocksForGroup[ms.group]||new Set();
      usedBlocksForGroup[ms.group].add(bi);
      placed=true;
    });
    if(!placed)unplaced.push(ms);
  });
  return {placements,unplaced};
}
let FRIDAY_AM_MAKEUP={uncovered:[]}; // recomputed each time applyBlockOverrides runs
let S_REF=null;
function applyBlockOverrides(sessions){
  S_REF={sessions};
  const missingHomeSkills=findMissingHomeSkills();
  const {placements:hsPlacements,unplaced:hsUnplaced}=findHomeSkillCatchupSlots(missingHomeSkills,'fri-swim-am');
  FRIDAY_AM_MAKEUP={uncovered:hsUnplaced.map(u=>({coach:u.homeCoach,topic:u.topic,group:u.group}))};
  const sess=sessions['fri-swim-am'];
  if(sess){
    const qBlocks=sess.blocks.filter(b=>!b.land&&!b.warmup);
    hsPlacements.forEach(p=>{
      const b=qBlocks[p.blockIdx];if(!b)return;
      const e=b.asg.find(a=>a.group===p.group&&a.activity!=='Routine');
      if(e){
        e.activity=p.activity;
        e.skills=fmtStation({activity:p.activity,topic:p.topic+' — own Routine coach’s station (catch-up)',bullets:p.bullets});
      }
    });
  }
}

function generateRoutineSchedule(sessions){
  const n=ROUTINE_ASSIGN.length;
  ROUTINE_SESSIONS.forEach(({sid,pattern,shift})=>{
    const sess=sessions[sid];
    if(!sess)return;
    const qBlocks=sess.blocks.filter(b=>!b.land&&!b.warmup);
    const rc=ROTATION_CONTENT[sid];
    qBlocks.forEach((blk,bi)=>{
      const p=pattern[bi];
      if(!p)return;
      const asg=[];
      p.routine.forEach(idx=>{
        const ra=ROUTINE_ASSIGN[(idx+shift)%n];
        asg.push({id:uid(),coach:ra.coach,activity:'Routine',skills:'',group:ra.group,notes:''});
      });
      p.rot.forEach(([ci,gi])=>{
        const c=ROUTINE_ASSIGN[(ci+shift)%n],g=ROUTINE_ASSIGN[(gi+shift)%n];
        let activity='',skills='';
        const isAcro=rc&&rc.acro&&rc.acro.some(a=>a.blockIdx===bi&&a.coach===c.coach);
        if(isAcro){ activity='Acro'; skills='15-min Acro session with '+g.group.replace('Team ','')+' (not their own Routine group).'; }
        else{
          let sc=null;
          if(rc&&rc.byGroupBlock&&rc.byGroupBlock[g.group]&&rc.byGroupBlock[g.group][bi]!==undefined){
            sc={activity:'Figure',topic:rc.byGroupBlock[g.group][bi]};
          }
          if(!sc&&rc&&rc.byCoachCluster&&rc.byCoachCluster[c.coach]){
            const cl=clusterOf(g.group);
            sc=cl&&rc.byCoachCluster[c.coach][cl];
          }
          if(!sc) sc=(rc&&rc.byCoach&&rc.byCoach[c.coach])||(rc&&rc.byGroup&&rc.byGroup[g.group]);
          if(sc){ activity=sc.activity; skills=fmtStation(sc); }
        }
        asg.push({id:uid(),coach:c.coach,activity,skills,group:g.group,notes:''});
      });
      blk.asg=asg;
    });
  });
}

function buildFreshSwimSessions(){

  ['mon','tue','wed','thu','fri'].forEach(d=>{

    if(pool&&POOL_WARMUP_PLANS[sid])pool.sharedPlan=POOL_WARMUP_PLANS[sid];

}

/* Rebuilds Mon–Fri swim sessions and the Week/Day itinerary from scratch using the CURRENT app
   logic — fixes anyone stuck on an outdated schedule shape/labels/times/day-structure from
   before a code update, without touching feedback, PIN, or hand-typed session plans. The only
   swim-session content that's actually hand-typed (land warm-up notes, pool warm-up shared
   plan) is carried over; other session plans move with their session if it changes day. */
function migrateSwimSchedule(){
  const landNotes={},poolPlans={},friPracticeNotes={};
  SWIM_SESSION_ORDER.forEach(sid=>{
    const sess=S.sessions[sid];if(!sess)return;
    const land=sess.blocks.find(b=>b.land);
    if(land)land.asg.forEach(a=>{ if(a.skills)landNotes[sid+'|'+a.coach+'|'+a.group]=a.skills; });
    const pool=sess.blocks.find(b=>b.warmup);
    if(pool&&pool.sharedPlan)poolPlans[sid]=pool.sharedPlan;
  });
  const friPmOld=S.sessions['fri-swim-pm'];
  if(friPmOld){
    const practice=friPmOld.blocks.find(b=>b.label==='Routine practice');
    if(practice)practice.asg.forEach(a=>{ if(a.skills)friPracticeNotes[a.coach]=a.skills; });
  }
  const fresh=buildFreshSwimSessions();
  SWIM_SESSION_ORDER.forEach(sid=>{ if(fresh[sid])S.sessions[sid]=fresh[sid]; });
  // Only the 5 named Routine coaches run swim warm-ups — see ROUTINE_ASSIGN. Land warm-up
  // uses only 4 of them (Maisie sits it out); pool warm-up uses all 5.
  generateWarmupRotation(S.sessions,LAND_WARMUP_COACHES,ROUTINE_ASSIGN.map(ra=>ra.coach),S.groups);
  generateRoutineSchedule(S.sessions);
  applyBlockOverrides(S.sessions);
  SWIM_SESSION_ORDER.forEach(sid=>{
    const sess=S.sessions[sid];if(!sess)return;
    const land=sess.blocks.find(b=>b.land);
    if(land)land.asg.forEach(a=>{ const k=sid+'|'+a.coach+'|'+a.group; if(landNotes[k])a.skills=landNotes[k]; });
    const pool=sess.blocks.find(b=>b.warmup);
    if(pool&&poolPlans[sid])pool.sharedPlan=poolPlans[sid];
  });
  const friPmNew=S.sessions['fri-swim-pm'];
  if(friPmNew){
    const practice=friPmNew.blocks.find(b=>b.label==='Routine practice');
    if(practice)practice.asg.forEach(a=>{ if(friPracticeNotes[a.coach])a.skills=friPracticeNotes[a.coach]; });
  }
  // One-time roster correction: Quentin is no longer attending camp — Romane covers his
  // Tuesday Land Training slot instead. Only touches things if Quentin is still present, so
  // it's a no-op for anyone who's already up to date.
  if(S.coaches&&S.coaches.includes('Quentin')){
    S.coaches=S.coaches.filter(c=>c!=='Quentin');
    const tueLand=S.sessions['tue-land'];
    if(tueLand)tueLand.blocks.forEach(b=>b.asg.forEach(a=>{ if(a.coach==='Quentin')a.coach='Romane'; }));
  }
  // One-time day swap: Ballet Workshop moves from Thursday to Wednesday, and the Winchester
  // Town trip moves from Wednesday to Thursday. The session itself (coach, any typed-in plan)
  // just moves with it — only its id/day change, so nothing about the plan content is lost.
  if(S.sessions['thu-dance']&&!S.sessions['wed-dance']){
    S.sessions['wed-dance']={...S.sessions['thu-dance'],id:'wed-dance',day:'wed'};
    delete S.sessions['thu-dance'];
  }
  // S.schedule (the Week/Day itinerary) is fully derived, no hand-typed content lives there —
  // safe to rebuild wholesale so the trip/workshop end up on the right days automatically.
  S.schedule=buildFreshSchedule();
  S.scheduleVersion=SCHEDULE_VERSION;
}

let S;
let pendingScheduleRepush=false;
function load(){
  try{
    const raw=localStorage.getItem(LS);
    if(raw){
      S=JSON.parse(raw);
      if(!S.figureMedia)S.figureMedia={};
      if(!S.skillMedia)S.skillMedia={};
      if(S.scheduleVersion!==SCHEDULE_VERSION){
        migrateSwimSchedule();
        save();
        pendingScheduleRepush=true; // push to cloud once initCloud() has a live connection
      }
      return;
    }
  }catch(e){}
  S=seed();save();
}
function save(){
  try{localStorage.setItem(LS,JSON.stringify(S));}
  catch(e){alert('Could not save — storage may be full. Try exporting your feedback, then delete some photo feedback entries.');}
}

function coachInSession(sid){
  const s=S.sessions[sid];if(!s)return false;
  return s.blocks.some(b=>b.asg.some(a=>a.coach===me));

function sessionPlanned(sid){
  const s=S.sessions[sid];if(!s)return false;
  return s.blocks.some(b=>b.asg.length>0);

function sessionCoaches(sid){
  // for week/day summaries: who's running the actual session content (skip warm-up rotation, which involves everyone)

  DAYS.forEach(d=>{

      if(it.sid){

        chips+=`<button class="sess-chip ${CAT2SC[it.cat]||'sc-gen'}" onclick="openSession('${it.sid}')">${esc(S.sessions[it.sid].title)}<small>${esc(it.t)}${cs.length?' · '+cs.map(esc).join(', '):''}</small></button>`;

function mediaEditHtml(obj,prefix){

    <button class="btn sec sm" onclick="${prefix}AddLink()">+ Link</button>
  </div>`;

function readImageCompressed(file,cb){
  const rd=new FileReader();
  rd.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=800;let w=img.width,hh=img.height;
      if(w>max||hh>max){const r=Math.min(max/w,max/hh);w=Math.round(w*r);hh=Math.round(hh*r);}
      const c=document.createElement('canvas');c.width=w;c.height=hh;
      c.getContext('2d').drawImage(img,0,0,w,hh);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}

/* ---- Attendance: tick athletes in as they arrive at land warm-up; Late auto-logs feedback ---- */
function rAttendance(s,b,bi){
  const present=new Set(b.asg.filter(a=>!(onlyMe&&me&&a.coach&&a.coach!==me)).map(a=>a.group).filter(g=>g&&g!=='All groups'));
  const groups=LANE_ORDER.filter(g=>present.has(g));
  if(!groups.length)return '';
  if(!b.attendance)b.attendance={};
  let h='<div class="attendance"><div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:4px">Attendance</div>';
  groups.forEach(g=>{
    const coachEntry=b.asg.find(a=>a.group===g);
    h+=`<div style="margin-bottom:6px"><div style="font-size:.78rem;font-weight:700;color:var(--purple-dark);margin-bottom:2px">${esc(g)}${coachEntry&&coachEntry.coach?' — '+esc(coachEntry.coach):''}</div>`;
    S.athletes.filter(a=>a.g===g).forEach(ath=>{
      const rec=b.attendance[ath.n];
      const st=rec&&rec.status;
      h+=`<div class="attrow"><span>${esc(ath.n)}</span><span class="attbtns">
        <button class="${st==='present'?'on':''}" onclick="markAttendance('${s.id}',${bi},'${esc(ath.n)}','present')">✓ Here</button>
        <button class="${st==='late'?'on late':''}" onclick="markAttendance('${s.id}',${bi},'${esc(ath.n)}','late')">Late</button>
      </span></div>`;
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}
function markAttendance(sid,bi,athleteName,status){
  const b=S.sessions[sid].blocks[bi], s=S.sessions[sid];
  if(!b.attendance)b.attendance={};
  const cur=b.attendance[athleteName];
  if(cur&&cur.fbId){ S.feedback=S.feedback.filter(f=>f.id!==cur.fbId); removeFeedback(cur.fbId); }
  if(cur&&cur.status===status){
    delete b.attendance[athleteName];
  }else{
    let fbId=null;
    if(status==='late'){
      const entry={id:uid(),athlete:athleteName,coach:me||'Coach',day:s.day,session:s.title,skills:'Land warm-up attendance',text:'Athlete arrived late to Land Warm Up',photo:null,ts:Date.now()};
      S.feedback.push(entry);pushFeedback(entry);
      fbId=entry.id;
    }
    b.attendance[athleteName]={status,fbId};
  }
  save();pushSession(sid);render();
}

    img.onload=()=>{
      const max=900;let w=img.width,hh=img.height;
      if(w>max||hh>max){const r=Math.min(max/w,max/hh);w=Math.round(w*r);hh=Math.round(hh*r);}
      const c=document.createElement('canvas');c.width=w;c.height=hh;
      c.getContext('2d').drawImage(img,0,0,w,hh);
      fbPhoto=c.toDataURL('image/jpeg',0.7);
      const pv=document.getElementById('fb_prev');pv.src=fbPhoto;pv.style.display='block';
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}

function warmupRotationSummary(){
  const dayLabel={mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri'};
  return SWIM_SESSION_ORDER.map(sid=>{
    const sess=S.sessions[sid];
    if(!sess)return '';
    const land=sess.blocks.find(b=>b.land);
    const pool=sess.blocks.find(b=>b.warmup);
    if((!land||!land.asg.length)&&(!pool||!pool.asg.length))return '';
    const landPairs=land&&land.asg.length?sortByLane(land.asg).map(a=>`${esc(a.coach||'Unassigned')}→${esc((a.group||'—').replace('Team ',''))}`).join(', '):'—';
    const poolPairs=pool&&pool.asg.length?sortByLane(pool.asg).map(a=>`Lane ${LANE_NUMBER[a.group]||'?'} ${esc((a.group||'—').replace('Team ',''))}: ${esc(a.coach||'Unassigned')}`).join(', '):'—';
    const label=(dayLabel[sess.day]||sess.day)+' '+(sid.includes('-am')?'AM':'PM');
    return `<div style="margin-bottom:8px;font-size:.82rem"><b>${esc(label)}</b><br><span style="color:var(--muted)">Land:</span> ${landPairs}<br><span style="color:var(--muted)">Pool:</span> ${poolPairs}</div>`;
  }).join('');
}
function fridayAmHomeSkillCatchupSummary(){
  const sess=S.sessions['fri-swim-am'];
  if(!sess)return '';
  const qb=sess.blocks.filter(b=>!b.land&&!b.warmup);
  return ROUTINE_ASSIGN.map(ra=>{
    const found=[];
    qb.forEach(b=>b.asg.forEach(a=>{
      if(a.group===ra.group&&a.skills&&a.skills.indexOf('own Routine coach')!==-1){
        found.push(a.skills.split(' — own Routine')[0]);
      }
    }));
    if(!found.length) return `<b>${esc(ra.group.replace('Team ',''))}</b>: not yet placed — tap "Regenerate Routine schedule" below`;
    return `<b>${esc(ra.group.replace('Team ',''))}</b>: gets all ${found.length} of ${esc(ra.coach)}'s topics on Friday AM (${found.map(esc).join('; ')})`;
  }).join('<br>');
}
const PM_FIGURE_SESSIONS=[{sid:'mon-swim-pm',label:'Mon'},{sid:'tue-swim-pm',label:'Tue'},{sid:'wed-swim-pm',label:'Wed'},{sid:'thu-swim-pm',label:'Thu'}];
function pmCoverageSummary(sid){
  const sess=S.sessions[sid];
  if(!sess)return '';
  const qb=sess.blocks.filter(b=>!b.land&&!b.warmup);
  const perGroup={};
  S.groups.forEach(g=>perGroup[g]={acro:[],figures:new Set()});
  qb.forEach(b=>b.asg.forEach(a=>{
    if(!perGroup[a.group])return;
    if(a.activity==='Acro')perGroup[a.group].acro.push(a.coach);
    else if(a.activity==='Figure')perGroup[a.group].figures.add(a.skills);
  }));
  return sortByLane(S.groups).map(g=>{
    const p=perGroup[g];
    return `<b>${esc(g.replace('Team ',''))}</b>: Acro with ${esc(p.acro.join(', ')||'—')}; ${p.figures.size} figure${p.figures.size===1?'':'s'} (${[...p.figures].map(esc).join(', ')||'none'})`;
  }).join('<br>');
}
function pmCoverageWeekSummary(){
  return PM_FIGURE_SESSIONS.map(({sid,label})=>`<div style="margin-bottom:8px"><b style="color:var(--purple-dark)">${label} PM</b><br>${pmCoverageSummary(sid)}</div>`).join('');
}
function pmFigureTotalsSummary(){
  const totals={};
  S.groups.forEach(g=>totals[g]=new Set());
  PM_FIGURE_SESSIONS.forEach(({sid})=>{
    const sess=S.sessions[sid];if(!sess)return;
    sess.blocks.filter(b=>!b.land&&!b.warmup).forEach(b=>b.asg.forEach(a=>{
      if(a.activity==='Figure'&&totals[a.group])totals[a.group].add(a.skills);
    }));
  });
  return sortByLane(S.groups).map(g=>{
    const need=figuresListFor(g).length;
    const got=totals[g].size;
    const ok=got>=need;
    return `<b>${esc(g.replace('Team ',''))}</b>: ${got}/${need} figures covered${ok?' ✅':''}`;
  }).join('<br>');
}

function regenerateRotation(){
  if(!confirm('Regenerate the warm-up rotation for all 10 swim sessions? This overwrites current coach/group warm-up assignments.'))return;
  // remember existing land-warmup notes by coach+group so they aren't lost if the pairing recurs
  const oldNotes={};
  SWIM_SESSION_ORDER.forEach(sid=>{
    const sess=S.sessions[sid];if(!sess)return;
    const land=sess.blocks.find(b=>b.land);
    if(land)land.asg.forEach(a=>{if(a.skills)oldNotes[sid+'|'+a.coach+'|'+a.group]=a.skills;});
  });
  generateWarmupRotation(S.sessions,LAND_WARMUP_COACHES,ROUTINE_ASSIGN.map(ra=>ra.coach),S.groups);
  SWIM_SESSION_ORDER.forEach(sid=>{
    const sess=S.sessions[sid];if(!sess)return;
    const land=sess.blocks.find(b=>b.land);
    if(land)land.asg.forEach(a=>{const k=sid+'|'+a.coach+'|'+a.group;if(oldNotes[k])a.skills=oldNotes[k];});
  });
  save();
  SWIM_SESSION_ORDER.forEach(sid=>pushSession(sid));
  render();
}

  generateRoutineSchedule(S.sessions);

function download(name,obj){
  const blob=new Blob([JSON.stringify(obj)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function exportData(kind){
  if(kind==='feedback'){
    if(!S.feedback.length){alert('No feedback on this device yet.');return;}
    download(`insynch-feedback-${(me||'coach').replace(/\s+/g,'')}.json`,{type:'insynch-feedback',coach:me,feedback:S.feedback});
  }else{
    download('insynch-camp-setup.json',{type:'insynch-full',data:{coaches:S.coaches,groups:S.groups,athletes:S.athletes,sessions:S.sessions,schedule:S.schedule,feedback:[]}});
  }
}
function importFile(inp){
  const file=inp.files&&inp.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      if(obj.type==='insynch-feedback'){
        const before=S.feedback.length;
        const ids=new Set(S.feedback.map(f=>f.id));
        obj.feedback.forEach(f=>{if(!ids.has(f.id)){S.feedback.push(f);pushFeedback(f);}});
        save();render();
        alert(`Imported ${S.feedback.length-before} feedback entries${obj.coach?' from '+obj.coach:''}. (${obj.feedback.length-(S.feedback.length-before)} were already here.)`);
      }else if(obj.type==='insynch-full'){
        if(!confirm('Replace the plans, coaches, groups and athletes on this device with the imported setup? (Your feedback is kept.)'))return;
        S.coaches=obj.data.coaches;S.groups=obj.data.groups;S.athletes=obj.data.athletes;
        S.sessions=obj.data.sessions;S.schedule=obj.data.schedule;
        save();pushMeta();Object.keys(S.sessions).forEach(sid=>pushSession(sid));
        render();alert('Setup imported ✔');
      }else alert('Not a recognised In Synch file.');
    }catch(err){alert('Could not read that file.');}
    inp.value='';
  };
  rd.readAsText(file);
}

/* ================= CLOUD SYNC (Firebase) ================= */
let db=null, cloudOn=false, cloudReady=false;
function cloudRender(){ if(asgForm||view==='feedback')return; render(); }
function pushSession(sid){
  if(!cloudOn||!db)return;
  db.collection('sessions').doc(sid).set({json:JSON.stringify(S.sessions[sid])}).catch(()=>{});
}
function pushMeta(){
  if(!cloudOn||!db)return;
  db.collection('meta').doc('setup').set({
    coaches:S.coaches,groups:S.groups,
    athletesJson:JSON.stringify(S.athletes),
    scheduleJson:JSON.stringify(S.schedule),
    figureMediaJson:JSON.stringify(S.figureMedia||{}),
    skillMediaJson:JSON.stringify(S.skillMedia||{}),
    pin:S.pin||'2026'
  }).catch(()=>{});
}
function pushFeedback(f){
  if(!cloudOn||!db)return;
  db.collection('feedback').doc(f.id).set(f).catch(()=>{});
}
function removeFeedback(id){
  if(!cloudOn||!db)return;
  db.collection('feedback').doc(id).delete().catch(()=>{});
}
function initCloud(){
  if(typeof firebase==='undefined'||!FIREBASE_CONFIG||!FIREBASE_CONFIG.apiKey)return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    cloudOn=true;
    db.enablePersistence().catch(()=>{});
    if(pendingScheduleRepush){
      // This device just self-repaired an outdated swim schedule on load — push the fix to
      // the cloud now, before the listeners below get a chance to pull the old copy back down.
      SWIM_SESSION_ORDER.forEach(sid=>pushSession(sid));
      pushMeta();
      pendingScheduleRepush=false;
    }
    db.collection('meta').doc('setup').onSnapshot(d=>{
      cloudReady=true;
      if(d.exists){
        const m=d.data();
        S.coaches=m.coaches;S.groups=m.groups;
        S.athletes=JSON.parse(m.athletesJson);S.schedule=JSON.parse(m.scheduleJson);
        S.figureMedia=m.figureMediaJson?JSON.parse(m.figureMediaJson):(S.figureMedia||{});
        S.skillMedia=m.skillMediaJson?JSON.parse(m.skillMediaJson):(S.skillMedia||{});
        S.pin=m.pin;save();cloudRender();
      }else{
        pushMeta(); // first device online seeds the cloud
      }
    },()=>{});
    db.collection('sessions').onSnapshot(snap=>{
      cloudReady=true;
      if(snap.empty){Object.keys(S.sessions).forEach(sid=>pushSession(sid));return;}
      snap.docChanges().forEach(ch=>{
        if(ch.type==='removed')delete S.sessions[ch.doc.id];
        else S.sessions[ch.doc.id]=JSON.parse(ch.doc.data().json);
      });
      save();cloudRender();
    },()=>{});
    db.collection('feedback').onSnapshot(snap=>{
      cloudReady=true;
      const cloud=[];snap.forEach(d=>cloud.push(d.data()));
      // keep any local entries written while offline that haven't reached the cloud yet
      const ids=new Set(cloud.map(f=>f.id));
      S.feedback.filter(f=>!ids.has(f.id)).forEach(f=>{cloud.push(f);pushFeedback(f);});
      S.feedback=cloud;
      save();cloudRender();
    },()=>{});
  }catch(e){cloudOn=false;}
}

/* ================= INIT ================= */
load();
initCloud();
render();
</script>
